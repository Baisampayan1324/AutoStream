<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoStream | AI Social-to-Lead</title>
    <style>
        :root {
            --bg-light: #f1f5f9;
            --bg-card: #ffffff;
            --accent: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar - Lead Status */
        .sidebar {
            width: 320px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            box-shadow: 4px 0 15px rgba(0,0,0,0.02);
        }

        .brand h1 { font-size: 1.5rem; letter-spacing: -1px; color: var(--text-main); }
        .brand span { color: var(--accent); }

        .lead-status {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .lead-status h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; letter-spacing: 0.05em; }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }
        .status-item span:first-child { color: var(--text-muted); }
        .status-item span:last-child { font-weight: 600; color: #cbd5e1; }
        .status-item.filled span:last-child { color: #059669; }

        .badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            background: #e2e8f0;
            color: var(--text-muted);
            margin-top: 1rem;
            text-transform: uppercase;
        }
        .badge.active { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

        /* Main Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 1.25rem 2.5rem;
            border-bottom: 1px solid var(--border);
            background: white;
            z-index: 10;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            background: #f8fafc;
        }

        .message {
            max-width: 65%;
            padding: 0.85rem 1.25rem;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: white;
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 1.5rem 2.5rem 2.5rem;
            background: white;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            background: var(--bg-light);
            border-radius: 14px;
            padding: 6px;
            display: flex;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within { border-color: var(--accent); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 0 1rem;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.75rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        button:hover { background: #1d4ed8; transform: translateY(-1px); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">
            <h1>Auto<span>Stream</span></h1>
        </div>

        <div class="lead-status">
            <h3>Live Lead Capture</h3>
            <div id="status-name" class="status-item">
                <span>Name</span>
                <span class="val">-</span>
            </div>
            <div id="status-email" class="status-item">
                <span>Email</span>
                <span class="val">-</span>
            </div>
            <div id="status-platform" class="status-item">
                <span>Platform</span>
                <span class="val">-</span>
            </div>
            
            <div id="lead-badge" class="badge">Awaiting Interest</div>
        </div>

        <div style="margin-top: auto; font-size: 0.75rem; color: var(--text-muted);">
            Inflx Social-to-Lead Prototype<br>
            © 2026 ServiceHive
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h2 style="font-size: 1rem;">Conversational Agent</h2>
            <p style="font-size: 0.75rem; color: var(--text-muted);">Connected to Groq & OpenRouter</p>
        </div>

        <div class="messages" id="chat-messages">
            <div class="message bot">
                Hello! I'm the AutoStream Assistant. How can I help you with your video automation journey today?
            </div>
        </div>

        <div class="input-area">
            <form id="chat-form" class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button type="submit" id="send-btn">Send</button>
            </form>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatMessages = document.getElementById('chat-messages');
        const sendBtn = document.getElementById('send-btn');
        const threadId = 'session_' + Math.random().toString(36).substr(2, 9);

        const updateStatus = (state) => {
            if (state.name) {
                document.getElementById('status-name').querySelector('.val').innerText = state.name;
                document.getElementById('status-name').classList.add('filled');
            }
            if (state.email) {
                document.getElementById('status-email').querySelector('.val').innerText = state.email;
                document.getElementById('status-email').classList.add('filled');
            }
            if (state.platform) {
                document.getElementById('status-platform').querySelector('.val').innerText = state.platform;
                document.getElementById('status-platform').classList.add('filled');
            }
            if (state.lead_captured) {
                const badge = document.getElementById('lead-badge');
                badge.innerText = 'Lead Captured';
                badge.classList.add('active');
            }
        };

        const appendMessage = (text, role) => {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: threadId })
                });

                const data = await response.json();
                
                if (response.ok) {
                    appendMessage(data.response || "I received your message but have no specific response.", 'bot');
                    if (data.state) updateStatus(data.state);
                } else {
                    appendMessage(`Error: ${data.detail || 'The server encountered an issue.'}`, 'bot');
                }
            } catch (error) {
                appendMessage('Error: Could not connect to backend server. Make sure it is running on port 8000.', 'bot');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });
    </script>
</body>
</html>
